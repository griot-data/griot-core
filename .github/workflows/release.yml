name: Release

on:
  push:
    branches: [main]
  workflow_dispatch: # Allow manual trigger

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  # ── CI gates: must all pass before release ─────────────────────────
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install ruff
        run: pip install ruff

      - name: Lint
        run: ruff check src/

      - name: Format check
        run: ruff format --check src/

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install -e ".[dev]"
          pip install mypy

      - name: Type check
        run: mypy src/griot_core/

  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run tests
        run: pytest --tb=short -q || [ $? -eq 5 ]  # Exit 5 = no tests collected (OK)

  # ── Release: only runs after all CI jobs pass ──────────────────────
  release:
    needs: [lint, typecheck, test]
    runs-on: ubuntu-latest
    permissions:
      id-token: write  # PyPI Trusted Publishing (OIDC)
      contents: write  # Git tags & GitHub Releases

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # Semantic Release: analyzes conventional commits, bumps version,
      # creates tag, commit, and GitHub Release
      - name: Semantic Release
        id: release
        uses: python-semantic-release/python-semantic-release@v9.15.2
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          git_committer_name: "github-actions[bot]"
          git_committer_email: "github-actions[bot]@users.noreply.github.com"

      # Build sdist + wheel
      - name: Build package
        if: steps.release.outputs.released == 'true'
        run: |
          pip install build
          rm -rf dist/
          python -m build

      # Publish to PyPI via Trusted Publishing (no API token needed)
      - name: Publish to PyPI
        if: steps.release.outputs.released == 'true'
        uses: pypa/gh-action-pypi-publish@release/v1

      # Upload sdist + wheel to the GitHub Release
      - name: Upload to GitHub Release
        if: steps.release.outputs.released == 'true'
        uses: python-semantic-release/publish-action@v9.15.2
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          tag: ${{ steps.release.outputs.tag }}
